name: Publish Docker Image to GHCR

# This workflow runs ONLY when you publish a new release.
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and Publish to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # Use the standard GITHUB_TOKEN, which is automatically granted permissions
          password: ${{ secrets.GB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          # This will be automatically converted to lowercase: ghcr.io/euclidstellar/code-review-agent
          images: ghcr.io/${{ github.repository }}
          # This automatically creates tags based on the release version, e.g., v1.0.0, v1, latest

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Use the valid tags generated by the metadata-action step
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
