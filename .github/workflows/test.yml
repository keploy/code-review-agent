name: Test Code Review Action

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: read
  pull-requests: write

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff operations
          
      - name: Test Local Action
        uses: ./  # Now this will work
        with:
          github-token: ${{ secrets.GH_SECRET }}
          model: 'fail-hoja-bhai'  # Fix: Use available model
          max-tokens: 6700
          temperature: 0.1
          ignore-patterns: '*.md,node_modules/**'